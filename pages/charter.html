<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社團章程 — 交大動畫社</title>
  <meta name="description" content="國立陽明交通大學動畫社組織章程。">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

  <!-- Tailwind Config -->
  <script src="../public/js/tailwind-config.js"></script>

  <script>
    // Apply saved / system theme before first paint to prevent flash
    (function(){
      var s = localStorage.getItem('theme');
      if (s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <!-- Shared Styles -->
  <link rel="stylesheet" href="../public/css/shared.css">
</head>

<body class="bg-white text-dark antialiased">

<!-- ════════════════════════════════════════════════════════════
     NAVIGATION（由 shared.js buildNav 動態注入）
     ════════════════════════════════════════════════════════════ -->
<nav id="nav"></nav>


<!-- ════════════════════════════════════════════════════════════
     PAGE HEADER
     ════════════════════════════════════════════════════════════ -->
<section class="page-hero bg-off-white pt-24 pb-12 lg:pt-28 lg:pb-16">
  <div class="max-w-7xl mx-auto px-6 lg:px-8">
    <p class="text-[11px] tracking-[0.3em] text-mid font-display font-medium uppercase mb-2">Charter</p>
    <h1 class="text-3xl lg:text-4xl font-bold tracking-tight">社團章程</h1>
    <div class="w-12 h-[2px] bg-brand mt-4"></div>
    <div class="mt-6">
      <a href="../images/動畫社組織章程.pdf" download
         class="inline-flex items-center gap-2 text-sm text-brand hover:text-brand-dark transition-colors font-medium">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        下載 PDF 檔案
      </a>
    </div>
  </div>
</section>


<!-- ════════════════════════════════════════════════════════════
     PDF VIEWER
     ════════════════════════════════════════════════════════════ -->
<section class="py-8 lg:py-12">
  <div class="max-w-7xl mx-auto px-6 lg:px-8">
    <div class="bg-off-white border border-dark/10 overflow-hidden">
      <!-- PDF Embed Container -->
      <div class="relative w-full" style="height: 800px;">
        <iframe 
          src="../images/動畫社組織章程.pdf"
          class="absolute inset-0 w-full h-full"
          title="動畫社組織章程"
          loading="lazy">
        </iframe>
      </div>
    </div>
    
    <!-- Fallback notice -->
    <p class="text-sm text-dark/40 mt-4 text-center">
      若 PDF 無法正常顯示，請
      <a href="../images/動畫社組織章程.pdf" target="_blank" rel="noopener" class="text-brand hover:text-brand-dark transition-colors underline">
        點此於新分頁開啟
      </a>
      或下載檔案閱讀。
    </p>
  </div>
</section>


<!-- ════════════════════════════════════════════════════════════
     FOOTER（由 shared.js buildFooter 動態注入）
     ════════════════════════════════════════════════════════════ -->
<footer id="footer"></footer>


<!-- ════════════════════════════════════════════════════════════
     SCRIPTS
     ════════════════════════════════════════════════════════════ -->
<script src="../public/js/shared.js"></script>
<script>
  buildNav('../', 'charter');
  buildFooter();
  initShared();
</script>

</body>
</html>
